name: Fides Compliance & Deployment

on:
  push:
    branches: [ main ]

env:
  FIDES_SERVER_URL: "https://fides.13.134.88.9.nip.io" # Update to your public fides endpoint in cloud
  FIDES_API_TOKEN: ${{ secrets.FIDES_API_TOKEN }}       # a static token OR a service-account key (fides_<prefix>_<secret>)
  FIDES_ENCRYPTION_KEY: ${{ secrets.FIDES_ENCRYPTION_KEY }}
  ORG_ID: "5d57b8c7-4328-4e1b-93df-4161b9a918a3"
  FLOW_ID: "f83b3e8c-8dc7-4a0b-ae95-716d1ba1f122"
  ENV_ID: "9f3c7ea1-420a-4288-ae31-716d1ba1f0e1"        # the target (prod) environment

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Fides CLI
        run: |
          curl -sSfL https://fides.internal.company.com/cli/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Start Trail Run
        run: |
          fides trail start \
            --flow $FLOW_ID \
            --trail ${{ github.sha }} \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --message "${{ github.event.head_commit.message }}"

      - name: Build Docker Container
        run: |
          docker build -t fides-testing-service:${{ github.sha }} .
          DIGEST=$(docker inspect --format='{{index .Id}}' fides-testing-service:${{ github.sha }})
          echo "IMAGE_DIGEST=${DIGEST#sha256:}" >> $GITHUB_ENV

      - name: Register Artifact
        run: |
          fides artifact report \
            --org $ORG_ID --trail ${{ github.sha }} \
            --sha256 $IMAGE_DIGEST --name "fides-testing-service" --type "docker"

      # --- Evidence via built-in parsers (real report formats) ---
      - name: Attest Unit Tests (JUnit)
        run: |
          # produce a real junit.xml from your test runner, e.g. pytest --junitxml=junit.xml
          cat > junit.xml <<'XML'
          <testsuites><testsuite name="app"><testcase name="health"/><testcase name="api"/></testsuite></testsuites>
          XML
          fides attest junit --trail ${{ github.sha }} --artifact-sha $IMAGE_DIGEST --file junit.xml

      - name: Attest Vulnerability Scan (Trivy)
        run: |
          # trivy image -f json -o trivy.json fides-testing-service:${{ github.sha }}
          echo '{"Results":[{"Vulnerabilities":[]}]}' > trivy.json
          fides attest trivy --trail ${{ github.sha }} --artifact-sha $IMAGE_DIGEST --file trivy.json

      - name: Attest SBOM (generic)
        run: |
          echo '{"components":[{"name":"fastapi","license":"MIT"}]}' > sbom.json
          fides attest --trail ${{ github.sha }} --artifact-sha $IMAGE_DIGEST \
            --name "sbom" --type "sbom" --payload sbom.json --encrypt

      # --- Gates: tamper-evidence + policy + approval (each exits non-zero on failure) ---
      - name: Verify tamper-evidence chain
        run: fides verify-chain --trail ${{ github.sha }}

      - name: Policy gate
        run: fides assert --sha256 $IMAGE_DIGEST --policy "production-release-rules"

      - name: Approve artifact for the environment
        run: |
          fides allowlist add --env $ENV_ID --sha $IMAGE_DIGEST --reason "CI gate passed for ${{ github.sha }}"
          fides allowlist check --env $ENV_ID --sha $IMAGE_DIGEST

      # --- Deploy ---
      - name: Deploy to K8s dev, uat, prod
        run: |
          kubectl apply -f kubernetes/namespaces.yaml
          kubectl apply -f kubernetes/deployment.yaml -n fides-dev
          kubectl apply -f kubernetes/deployment.yaml -n fides-uat
          kubectl apply -f kubernetes/deployment.yaml -n fides-prod

      - name: Update Runtime State snapshot
        run: fides snapshot k8s --env $ENV_ID --namespace "fides-prod"

      # --- Evidence artifact for auditors ---
      - name: Download audit package
        run: fides audit --trail ${{ github.sha }} --output trail-audit.zip

      - name: Upload audit package
        uses: actions/upload-artifact@v4
        with:
          name: fides-audit-${{ github.sha }}
          path: trail-audit.zip
