name: Fides Compliance & Deployment

on:
  push:
    branches: [ main ]

env:
  FIDES_SERVER_URL: "https://fides.13.134.88.9.nip.io" # Update to your public fides endpoint in cloud
  FIDES_API_TOKEN: ${{ secrets.FIDES_API_TOKEN }}
  FIDES_ENCRYPTION_KEY: ${{ secrets.FIDES_ENCRYPTION_KEY }}
  ORG_ID: "5d57b8c7-4328-4e1b-93df-4161b9a918a3"
  FLOW_ID: "f83b3e8c-8dc7-4a0b-ae95-716d1ba1f122"

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Fides CLI
        run: |
          curl -sSfL https://fides.internal.company.com/cli/install.sh | sh
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Start Trail Run
        run: |
          fides trail start \
            --flow $FLOW_ID \
            --trail ${{ github.sha }} \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --message "${{ github.event.head_commit.message }}"

      - name: Build Docker Container
        run: |
          docker build -t fides-testing-service:${{ github.sha }} .
          DIGEST=$(docker inspect --format='{{index .Id}}' fides-testing-service:${{ github.sha }})
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Register Artifact
        run: |
          fides artifact report \
            --org $ORG_ID \
            --trail ${{ github.sha }} \
            --sha256 $IMAGE_DIGEST \
            --name "fides-testing-service" \
            --type "docker"

      - name: Attest Unit Tests
        run: |
          echo "{\"tests\": 10, \"failures\": 0, \"errors\": 0}" > junit-summary.json
          fides attest \
            --trail ${{ github.sha }} \
            --artifact-sha $IMAGE_DIGEST \
            --name "unit-tests" \
            --type "junit" \
            --payload junit-summary.json \
            --encrypt

      - name: Attest Snyk Scan
        run: |
          echo "{\"vulnerabilities\": {\"critical\": 0}}" > scan-summary.json
          fides attest \
            --trail ${{ github.sha }} \
            --artifact-sha $IMAGE_DIGEST \
            --name "snyk-scan" \
            --type "vulnerability-scan" \
            --payload scan-summary.json \
            --encrypt

      - name: Attest Secret Scan
        run: |
          echo "{\"leaks\": 0}" > secret-summary.json
          fides attest \
            --trail ${{ github.sha }} \
            --artifact-sha $IMAGE_DIGEST \
            --name "secret-scan" \
            --type "secret-scan" \
            --payload secret-summary.json \
            --encrypt

      - name: Policy Assert Gate
        run: |
          fides assert \
            --sha256 $IMAGE_DIGEST \
            --policy "production-release-rules"

      - name: Deploy to K8s dev, uat, prod
        run: |
          kubectl apply -f kubernetes/namespaces.yaml
          kubectl apply -f kubernetes/deployment.yaml -n fides-dev
          kubectl apply -f kubernetes/deployment.yaml -n fides-uat
          kubectl apply -f kubernetes/deployment.yaml -n fides-prod

      - name: Update Runtime State snapshot
        run: |
          fides snapshot k8s --env 9f3c7ea1-420a-4288-ae31-716d1ba1f0e1 --namespace "fides-prod"
